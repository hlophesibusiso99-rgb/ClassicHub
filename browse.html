<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse All Classics - Classic Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #e63946; --secondary: #1d3557; --accent: #f77f00;
            --light: #f1faee; --dark: #1d3557; --white: #ffffff;
            --shadow: 0 8px 16px rgba(0, 0, 0, 0.2); --transition: all 0.3s ease;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); color: var(--dark); line-height: 1.6; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background-color: var(--secondary); color: var(--white); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .logo span { color: var(--white); }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--white); font-weight: 500; transition: var(--transition); }
        .nav-links a:hover { color: var(--accent); }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: var(--transition); border: none; display: inline-block; }
        .btn-primary { background-color: var(--primary); color: var(--white); }
        .btn-primary:hover { background-color: #c1121f; transform: translateY(-2px); }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background-color: var(--primary); color: var(--white); }
        .btn-secondary { background-color: var(--accent); color: var(--white); }
        .listings-section { padding: 4rem 0; }
        .section-title { text-align: center; margin-bottom: 3rem; font-size: 2.5rem; color: var(--secondary); position: relative; }
        .section-title::after { content: ''; display: block; width: 80px; height: 4px; background: var(--primary); margin: 10px auto; }
        .filters { background: var(--white); padding: 1.5rem; border-radius: 10px; margin-bottom: 2rem; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; box-shadow: var(--shadow); }
        .filters select, .filters input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .car-card { background: var(--white); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); transition: var(--transition); }
        .car-card:hover { transform: translateY(-10px); }
        .car-image { width: 100%; height: 200px; object-fit: cover; }
        .car-info { padding: 1.5rem; }
        .car-info h3 { margin-bottom: 0.5rem; font-size: 1.4rem; }
        .car-price { color: var(--primary); font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem; }
        .car-actions { display: flex; gap: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--white); padding: 2rem; border-radius: 10px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; }
        .modal-image { width: 100%; height: 400px; object-fit: cover; border-radius: 5px; margin: 1rem 0; }
        footer { background-color: var(--secondary); color: var(--white); padding: 4rem 0 2rem; margin-top: 4rem; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; margin-bottom: 2rem; }
        .footer-section h3 { margin-bottom: 1.5rem; color: var(--accent); }
        .footer-section a { display: block; margin-bottom: 0.5rem; transition: var(--transition); }
        .footer-section a:hover { color: var(--accent); }
        .footer-bottom { text-align: center; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); }
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="logo"><h1>Classic<span>Hub</span></h1></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="browse.html">Browse</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="btn btn-outline">Login</a></li>
            </ul>
        </div>
    </header>

    <div id="browse" class="page">
        <section class="listings-section container">
            <h2 class="section-title">Browse All Classics</h2>
            <div class="filters">
                <select id="makeFilter" onchange="filterCars()">
                    <option value="">All Makes</option>
                    <option value="Dodge">Dodge</option>
                    <option value="Plymouth">Plymouth</option>
                    <option value="Chevrolet">Chevrolet</option>
                </select>
                <select id="yearFilter" onchange="filterCars()">
                    <option value="">All Years</option>
                    <option value="1970">1970</option>
                    <option value="1971">1971</option>
                    <option value="1972">1972</option>
                </select>
                <input type="number" id="priceFilter" placeholder="Max Price (R)" onchange="filterCars()">
                <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
            </div>
            <div class="car-grid" id="allCars"></div>
        </section>
    </div>

    <div id="carModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <img id="modalImage" class="modal-image" src="" alt="">
            <p id="modalDetails"></p>
            <p id="modalPrice" style="font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 1rem 0;"></p>
            <button class="btn btn-primary" style="width: 100%; margin-bottom: 0.5rem;" onclick="contactSeller()">Contact Seller</button>
            <button class="btn btn-outline" style="width: 100%;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Classic Hub</h3>
                    <p>Your destination for authentic 1970s muscle cars.</p>
                </div>
                <div class="footer-section">
                    <h3>Quick Links</h3>
                    <a href="index.html">Home</a><br>
                    <a href="browse.html">Browse Cars</a><br>
                    <a href="about.html">About Us</a><br>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
            <div class="footer-bottom"><p>&copy; 2026 Classic Hub.</p></div>
        </div>
    </footer>

        function displayCars(containerId, carList) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            carList.forEach(car => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.innerHTML = `
                    <img src="${car.image}" class="car-image">
                    <div class="car-info">
                        <h3>${car.year} ${car.make} ${car.model}</h3>
                        <p class="car-price">R ${car.price.toLocaleString()}</p>
                        <div class="car-actions">
                            <button class="btn btn-primary" onclick="viewDetails(${car.id})">Details</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCars() {
            const make = document.getElementById('makeFilter').value;
            const year = document.getElementById('yearFilter').value;
            const maxPrice = document.getElementById('priceFilter').value;
            const filtered = cars.filter(c => (!make || c.make === make) && (!year || c.year.toString() === year) && (!maxPrice || c.price <= parseInt(maxPrice)));
            displayCars('allCars', filtered);
        }

        function resetFilters() {
            document.getElementById('makeFilter').value = '';
            document.getElementById('yearFilter').value = '';
            document.getElementById('priceFilter').value = '';
            displayCars('allCars', cars);
        }

        function viewDetails(id) {
            const car = cars.find(c => c.id === id);
            document.getElementById('modalTitle').textContent = car.make + ' ' + car.model;
            document.getElementById('modalImage').src = car.image;
            document.getElementById('modalDetails').textContent = car.description;
            document.getElementById('modalPrice').textContent = 'R ' + car.price.toLocaleString();
            document.getElementById('carModal').classList.add('active');
        }

        function closeModal() { document.getElementById('carModal').classList.remove('active'); }
        function contactSeller() { alert('Login to contact seller'); window.location.href='login.html'; }

        window.onload = () => displayCars('allCars', cars);
    </script>
</body>
</html>
